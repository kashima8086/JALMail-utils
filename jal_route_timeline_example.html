<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>JAL予約経路チェック図</title>
<style>
  body{margin:0;font-family:"Noto Sans JP","Yu Gothic","Meiryo",sans-serif;background:#f3f6fa;color:#111;}
  .wrap{padding:16px;} .card{position:relative;background:#fff;border:1px solid #d9e2ec;border-radius:14px;box-shadow:0 8px 24px rgba(0,0,0,.06);overflow:auto;}
  .note{margin:0 0 10px 2px;font-size:14px;color:#445;} svg{display:block;width:100%;height:auto;min-width:1450px;}
  
  /* ===== JAL予約メール 時系列表示 追加UI ===== */
  
  .airport,.label{cursor:default !important;}
  #routes path.route{
  stroke-opacity:0 !important;
  pointer-events:none !important;}
  #routes path.route.active,
  #routes path.route.dimmed{
  stroke-opacity:0 !important;
  pointer-events:none !important;}
  .timelineControlPanel{
  box-sizing:border-box;
  width:100%;
  height:100%;
  max-height:100%;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  background:rgba(255,255,255,.97);
  border:1px solid #d9e2ec;
  border-radius:14px;
  box-shadow:0 10px 30px rgba(0,0,0,.16);
  padding:14px;
  font-family:"Noto Sans JP","Yu Gothic","Meiryo",sans-serif;}
  .timelinePanelForeignObject{overflow:hidden;pointer-events:auto;}
  .timelineControlPanel h2{margin:0 0 8px;font-size:17px;}
  .timelineButtons{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin:10px 0;}
  .timelineButtons button{border:1px solid #b8c4d0;background:#fff;border-radius:8px;padding:8px 6px;cursor:pointer;font-weight:700;}
  .timelineButtons button:hover{background:#eef5fb;}
  .timelineCounter{font-size:13px;color:#445;line-height:1.5;margin:6px 0 10px;}
  .timelineCurrent{border:1px solid #f2c6c3;background:#fff8f7;border-radius:10px;padding:10px;margin:8px 0 10px;font-size:13px;line-height:1.55;}
  .timelineList{
  display:grid;
  gap:6px;
  margin-top:8px;
  overflow-y:scroll;
  overflow-x:hidden;
  min-height:0;
  flex:1 1 auto;
  padding-right:4px;
  scrollbar-gutter:stable;
  scrollbar-width:thin;
  scrollbar-color:#8fa1b3 #f3f6fa;}
  .timelineItem{border:1px solid #d9e2ec;background:white;border-radius:9px;padding:8px;font-size:12px;cursor:pointer;line-height:1.45;}
  .timelineItem:hover{background:#f5f9fd;}
  .timelineItem.visible{border-color:#d94841;background:#fff2f1;}
  .timelineItem.current{box-shadow:0 0 0 2px rgba(217,72,65,.25);}
  .timelineRouteOverlay{
  stroke:#008000 !important;
  stroke-width:2 !important;
  stroke-opacity:0 !important;
  fill:none !important;
  stroke-linecap:round !important;
  pointer-events:stroke;
  transition:stroke-opacity .18s ease, stroke .18s ease;}
  .timelineRouteOverlay.visible{stroke-opacity:.92 !important;}
  .timelineRouteOverlay.current{stroke:#008000 !important;stroke-opacity:1 !important;}
  .timelineRouteOverlay.insetRoute{stroke-width:2 !important;}
  .timelineAirportActive{fill:#ff7a00 !important;opacity:1 !important;}
  .timelineAirportVisited{fill:#1d4f84 !important;opacity:1 !important;}
  .timelineLabelActive{fill:#ff7a00 !important;opacity:1 !important;}
  .timelineLabelVisited{fill:#1d4f84 !important;opacity:1 !important;}
  .timelineWarning{color:#a33;font-size:12px;margin-top:8px;white-space:pre-wrap;}
  @media print{.timelineControlPanel{box-shadow:none;}}
  .timelinePanelForeignObject *{pointer-events:auto;}
  
  /* ===== 座標確認用デバッグ表示 ===== */
  .coordinateDebugPanel{
  position:absolute;
  right:18px;
  top:18px;
  z-index:9999;
  min-width:220px;
  padding:10px 12px;
  background:rgba(255,255,255,.96);
  border:1px solid #90a4b8;
  border-radius:10px;
  box-shadow:0 6px 18px rgba(0,0,0,.16);
  font-family:"Noto Sans JP","Yu Gothic","Meiryo",sans-serif;
  font-size:13px;
  line-height:1.5;
  color:#111;
  pointer-events:none;}
  .coordinateDebugPanel code{
  font-family:Consolas,"Courier New",monospace;
  font-size:13px;}
  

/* ===== デバッグ：全ルート強制表示 ===== */
.debug-show-all-routes #routes path.route {
  stroke-opacity: 0.9 !important;
  pointer-events: none !important;
}


/* ===== デバッグ：指定空港のルートだけ強制表示 =====
   body に debug-show-airport-routes が付いた場合、
   JavaScriptで .debugAirportRoute を付与した区間線だけ表示します。 */
.debug-show-airport-routes #routes path.route {
  stroke-opacity: 0 !important;
  pointer-events: none !important;
}
.debug-show-airport-routes #routes path.route.debugAirportRoute {
  stroke-opacity: 0.9 !important;
  pointer-events: none !important;
}





/* ===== デバッグ：複製ルート最前面表示レイヤー =====
   本番用の #routes はDOM移動しません。
   デバッグ時だけ #routesDebugOverlay に区間線を複製し、SVG末尾に置くことで最前面表示します。 */
#routesDebugOverlay {
  pointer-events: none;
}
#routesDebugOverlay path.routeDebugClone {
  stroke: #2f6da8 !important;
  stroke-width: 2 !important;
  stroke-opacity: 0.9 !important;
  fill: none !important;
  stroke-linecap: round !important;
  pointer-events: none !important;
}

</style>

  if (x >= 1000 && x <= 1780 && y >= 671 && y <= 1100) return true;}
  return false;}
  
  function buildOverlays() {
  TIMELINE_FLIGHTS.forEach((f, idx) => {
  const base = findRoutePath(f.departure_svg, f.arrival_svg);
  const isReverse = Boolean(base && base.dataset.a === f.arrival_svg && base.dataset.b === f.departure_svg);
  let line = null;
  
  if (base) {
  line = base.cloneNode(false);
  line.removeAttribute('id');} else {
  line = makeFallbackPath(f.departure_svg, f.arrival_svg);
  warnings.push(`SVG内に既存routeがありません。直線で代替: ${f.departure_svg} → ${f.arrival_svg}`);}
  
  if (!line) {
  warnings.push(`空港座標が見つからず描画できません: ${f.departure_svg} → ${f.arrival_svg}`);
  overlays.push(null);
  return;}
  
  line.classList.remove('route',  'active', 'dimmed');
  line.classList.add('timelineRouteOverlay');
  if (isInsetRoute(line)) line.classList.add('insetRoute');
  line.dataset.timelineIndex = String(idx);
  line.dataset.a = f.departure_svg;
  line.dataset.b = f.arrival_svg;
  line.removeAttribute('marker-start');
  line.removeAttribute('marker-end');
  line.dataset.arrowPosition = isReverse ? 'start' : 'end';
  
  const title = document.createElementNS(SVG_NS, 'title');
  title.textContent = titleText(f);
  line.appendChild(title);
  line.addEventListener('click', () => { currentStep = idx + 1; render();});
  overlayGroup.appendChild(line);
  overlays.push(line);});}
  
  function clearAirportTimelineClasses() {
  svg.querySelectorAll('.timelineAirportActive,.timelineAirportVisited,.timelineLabelActive,.timelineLabelVisited')
  .forEach(el => el.classList.remove('timelineAirportActive','timelineAirportVisited','timelineLabelActive','timelineLabelVisited'));}
  
  function markAirport(name, active) {
  const circle = svg.querySelector(`circle.airport[data-airport="${CSS.escape(name)}"]`);
  const label = svg.querySelector(`text.label[data-airport="${CSS.escape(name)}"]`);
  if (circle) circle.classList.add(active ? 'timelineAirportActive' : 'timelineAirportVisited');
  if (label) label.classList.add(active ? 'timelineLabelActive' : 'timelineLabelVisited');}
  
  function renderList() {
  const list = document.getElementById('timelineList');
  if (!list) return;
  list.innerHTML = '';
  TIMELINE_FLIGHTS.forEach((f, idx) => {
  const item = document.createElement('div');
  item.className = 'timelineItem';
  if (idx < currentStep) item.classList.add('visible');
  if (idx === currentStep - 1) item.classList.add('current');
  item.innerHTML = `
  <b>#${f.index} ${esc(f.departure_svg)} → ${esc(f.arrival_svg)}</b><br>
  ${esc(f.boarding_date)} ${esc(f.departure_time)}-${esc(f.arrival_time)} ${esc(f.flight_number || '')}<br>
  <span>${esc(f.fare_name || '')} / ${esc(f.seat_class || '')}</span>
  `;
  item.addEventListener('click', () => { currentStep = idx + 1; render();});
  list.appendChild(item);});
  const currentItem = list.querySelector('.timelineItem.current');
  if (currentItem) {
  currentItem.scrollIntoView({
  block: 'nearest',
  inline: 'nearest',
  behavior: 'smooth'
  });
  }
  }
  
  function render() {
  if (currentStep < 0) currentStep = 0;
  if (currentStep > TIMELINE_FLIGHTS.length) currentStep = TIMELINE_FLIGHTS.length;
  
  overlays.forEach((line, idx) => {
  if (!line) return;
  const isVisible = idx < currentStep;
  const isCurrent = idx === currentStep - 1;
  line.classList.toggle('visible', isVisible);
  line.classList.toggle('current', isCurrent);
  line.removeAttribute('marker-start');
  line.removeAttribute('marker-end');
  if (isVisible) {
  if (line.dataset.arrowPosition === 'start') {
  line.setAttribute('marker-start', 'url(#timelineArrow)');} else {
  line.setAttribute('marker-end', 'url(#timelineArrow)');}}});
  
  clearAirportTimelineClasses();
  for (let i = 0; i < currentStep; i++) {
  const f = TIMELINE_FLIGHTS[i];
  const active = i === currentStep - 1;
  markAirport(f.departure_svg, active);
  markAirport(f.arrival_svg, active);}
  
  const counter = document.getElementById('timelineCounter');
  if (counter) counter.innerHTML = `表示中: <b>${currentStep}</b> / ${TIMELINE_FLIGHTS.length} 区間`;
  
  const current = document.getElementById('timelineCurrent');
  if (current) {
  if (currentStep === 0) {
  current.innerHTML = '初期状態では全ての路線を非表示にしています。<br>「進む」で1区間ずつ表示します。';} else {
  const f = TIMELINE_FLIGHTS[currentStep - 1];
  current.innerHTML = `
  <b>現在: #${f.index} ${esc(f.departure_svg)} → ${esc(f.arrival_svg)}</b><br>
  ${esc(f.boarding_date)} ${esc(f.departure_time)}-${esc(f.arrival_time)} ${esc(f.flight_number || '')}<br>
  元データ: ${esc(f.departure)} → ${esc(f.arrival)}<br>
  ${esc(f.fare_name || '')} / ${esc(f.seat_class || '')}
  `;}}
  
  const warning = document.getElementById('timelineWarning');
  if (warning) warning.textContent = Array.from(new Set(warnings)).join('\n');
  renderList();}
  
  document.getElementById('timelinePrevBtn')?.addEventListener('click', () => { currentStep -= 1; render();});
  document.getElementById('timelineNextBtn')?.addEventListener('click', () => { currentStep += 1; render();});
  document.getElementById('timelineAllBtn')?.addEventListener('click', () => { currentStep = TIMELINE_FLIGHTS.length; render();});
  document.getElementById('timelineResetBtn')?.addEventListener('click', () => { currentStep = 0; render();});
  
  buildOverlays();
  render();
})();</script>

<script>
  /* ===== 空港位置調整用: SVG座標クリック表示 =====
  無効化する場合は false にしてください。 */
  const ENABLE_COORDINATE_DEBUG = false;
  
  (function(){
  if (!ENABLE_COORDINATE_DEBUG) return;
  
  const svg = document.getElementById('networkSvg');
  const panel = document.getElementById('coordinateDebugPanel');
  const svgOut = document.getElementById('coordinateDebugSvg');
  const clientOut = document.getElementById('coordinateDebugClient');
  
  if (!svg || !panel || !svgOut || !clientOut) return;
  
  panel.style.display = 'block';
  
  function getSvgPoint(evt) {
  const pt = svg.createSVGPoint();
  pt.x = evt.clientX;
  pt.y = evt.clientY;
  return pt.matrixTransform(svg.getScreenCTM().inverse());}
  
  svg.addEventListener('click', function(evt) {
  const p = getSvgPoint(evt);
  svgOut.textContent = `${p.x.toFixed(2)}, ${p.y.toFixed(2)}`;
  clientOut.textContent = `${evt.clientX}, ${evt.clientY}`;}, true);})();

/* ===== デバッグオプション =====
   通常運用では両方とも false / 空文字のままにしてください。

   1) 全区間線を表示したい場合:
      DEBUG_SHOW_ALL_ROUTES = true

   2) 特定空港に関係する区間線だけ表示したい場合:
      DEBUG_ROUTE_AIRPORT = "羽田" のように空港名を指定
      例: "千歳", "羽田", "那覇", "福岡"

   3) デバッグ表示時に発着両方向の矢印も表示する場合:
      DEBUG_SHOW_ROUTE_ARROWS = true

   安全設計:
      本番用の #routes は移動しません。
      デバッグ対象の path だけを #routesDebugOverlay に複製し、
      SVG末尾へ置くことで最前面に表示します。
      そのため、デバッグ無効時のタイムライン機能・通常表示には影響しません。
*/
const DEBUG_SHOW_ALL_ROUTES = false;
const DEBUG_ROUTE_AIRPORT = "";  // 例: "羽田"
const DEBUG_SHOW_ROUTE_ARROWS = true;

(function setupRouteDebugOptions() {
  const svg = document.getElementById("networkSvg");
  if (!svg) return;

  const routePaths = svg.querySelectorAll("#routes path.route");

  // 既存のデバッグ用複製レイヤーを初期化
  const oldOverlay = document.getElementById("routesDebugOverlay");
  if (oldOverlay) oldOverlay.remove();

  document.body.classList.remove("debug-show-all-routes");
  document.body.classList.remove("debug-show-airport-routes");

  // デバッグ無効時は何もしない。
  // #routes のDOM順を変更しないため、通常機能に影響しない。
  const airportName = String(DEBUG_ROUTE_AIRPORT || "").trim();
  const debugEnabled = DEBUG_SHOW_ALL_ROUTES || airportName;
  if (!debugEnabled) return;

  // SVG末尾にデバッグ専用レイヤーを作る。
  // SVGは後にある要素ほど手前に描画されるため、このレイヤーが最前面になる。
  const debugOverlay = document.createElementNS("http://www.w3.org/2000/svg", "g");
  debugOverlay.setAttribute("id", "routesDebugOverlay");
  svg.appendChild(debugOverlay);

  function isDebugTarget(path) {
    if (DEBUG_SHOW_ALL_ROUTES) return true;
    return path.dataset.a === airportName || path.dataset.b === airportName;
  }

  function addDebugArrow(path) {
    if (!DEBUG_SHOW_ROUTE_ARROWS) return;
    // 始点側は auto-start-reverse の marker を使うことで、矢先が始点側を向く。
    // 終点側は通常の auto marker を使い、矢先が終点側を向く。
    path.setAttribute("marker-start", "url(#debugArrowHeadStart)");
    path.setAttribute("marker-end", "url(#debugArrowHeadEnd)");
  }

  routePaths.forEach((sourcePath) => {
    if (!isDebugTarget(sourcePath)) return;

    const clone = sourcePath.cloneNode(true);
    clone.classList.add("routeDebugClone");

    // デバッグ用複製なので、通常ルート用の状態クラスやイベント影響を除去
    clone.classList.remove("active", "dimmed");
    clone.removeAttribute("id");
    clone.style.pointerEvents = "none";

    addDebugArrow(clone);
    debugOverlay.appendChild(clone);
  });

  if (DEBUG_SHOW_ALL_ROUTES) {
    document.body.classList.add("debug-show-all-routes");
  } else {
    document.body.classList.add("debug-show-airport-routes");
  }
})();
</script>
